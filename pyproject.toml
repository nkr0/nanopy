[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "nanopy"
description = "Python implementation of NANO currency related functions"
readme = "README.md"
version = "28.0.1-7"

[project.optional-dependencies]
cibasic = ["mnemonic", "pytest"]
cifull = ["black", "coverage", "keyring", "mnemonic", "mypy", "pylint[spelling]", "pytest", "requests", "sphinx-autodoc-typehints", "types-requests", "websocket-client"]

[project.urls]
Repository = "https://github.com/nkr0/nanopy"
Documentation = "https://nkr0.github.io/nanopy"

[tool.coverage.run]
omit = ["src/nanopy/rpc.py", "tests/*"]

[tool.coverage.report]
fail_under = 100

[tool.mypy]
files = "src, tests, nanopy-wallet"
strict = true

[tool.pylint]
disable = ["c-extension-no-member", "too-many-arguments", "too-many-instance-attributes", "too-many-lines", "too-many-positional-arguments", "too-many-public-methods"]
