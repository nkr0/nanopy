on: [push, pull_request]
jobs:
  base:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - run: pipx run build -s
    - uses: actions/upload-artifact@v7
      with:
        name: nanopy-sdist
        path: dist
    - run: pip install -ve .[dev]
    - run: coverage run -m pytest
    - run: coverage report
    - run: black --check *.py */*.py */*/*.py nanopy-wallet
    - run: clang-format --dry-run -Werror src/nanopy/ext.c
    - run: mypy
    - run: pylint src
    - run: sphinx-build -W docs _site
    - run: sudo apt update
    - run: sudo apt install libomp-dev ocl-icd-opencl-dev
    - run: CC=clang pip install -ve .
    - run: pytest
    - run: USE_GPU=1 pip install -ve .
    - uses: actions/upload-pages-artifact@v4
  wheels:
    needs: base
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-26, macos-26-intel, macos-15, macos-15-intel, windows-latest, windows-11-arm]
    runs-on: ${{ matrix.os }}
    env:
      WHEELS: 1
    steps:
      - uses: actions/checkout@v6
      - if: matrix.os == 'macos-15' || matrix.os == 'macos-15-intel'
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CC: gcc-15
          MACOSX_DEPLOYMENT_TARGET: 15.0
      - if: matrix.os == 'macos-26' || matrix.os == 'macos-26-intel'
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CC: gcc-15
          MACOSX_DEPLOYMENT_TARGET: 26.0
      - if: runner.os != 'macOS'
        uses: pypa/cibuildwheel@v3.3.1
      - uses: actions/upload-artifact@v7
        with:
          name: nanopy-${{ matrix.os }}
          path: wheelhouse/*.whl
  deploy:
    if: github.ref_type == 'tag'
    needs: wheels
    permissions:
      pages: write
      id-token: write
    environment: deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: nanopy-*
        path: dist
        merge-multiple: true
    - uses: pypa/gh-action-pypi-publish@release/v1
    - uses: actions/deploy-pages@v4
